name: Finalize PGVista Repository

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: pgvista-finalize
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == 'finalize-pgvista-repository'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore source only when necessary
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f backend/cmd/server/main.go ]; then
            test -n "$(compgen -G 'bootstrap/part-*')"
            cat bootstrap/part-* > /tmp/PGVista-source.tar.gz.b64
            echo "877ee18ef6157261e8b3becccc0fa5d0321f45b67b0f0fa33a5c01b06f293356  /tmp/PGVista-source.tar.gz.b64" | sha256sum -c -
            base64 --decode /tmp/PGVista-source.tar.gz.b64 > /tmp/PGVista-source.tar.gz
            echo "493c205c5a6917486761f802afda0c378239e623f1361c0d57b96412300087b8  /tmp/PGVista-source.tar.gz" | sha256sum -c -
            tar -xzf /tmp/PGVista-source.tar.gz
          fi

      - name: Apply final source corrections
        shell: python
        run: |
          from pathlib import Path
          import re

          response = Path('backend/internal/api/response.go')
          text = response.read_text()
          text = re.sub(
              r'\nfunc username\(c \*gin\.Context\) string \{\n\tvalue, _ := c\.Get\("username"\)\n\tname, _ := value\.\(string\)\n\treturn name\n\}\n?$',
              '\n',
              text,
          )
          response.write_text(text)

          migration = Path('backend/internal/database/migrations/001_init.sql')
          text = migration.read_text()
          old = """BEGIN
              INSERT INTO lab.audit_log(table_name,action,row_data)
              VALUES('product',TG_OP,to_jsonb(COALESCE(NEW,OLD)));
              RETURN COALESCE(NEW,OLD);
          END;"""
          new = """BEGIN
              IF TG_OP = 'DELETE' THEN
                  INSERT INTO lab.audit_log(table_name,action,row_data)
                  VALUES('product',TG_OP,to_jsonb(OLD));
                  RETURN OLD;
              END IF;
              INSERT INTO lab.audit_log(table_name,action,row_data)
              VALUES('product',TG_OP,to_jsonb(NEW));
              RETURN NEW;
          END;"""
          migration.write_text(text.replace(old, new))

          for name in ('docker-compose.yml', 'deploy/compose.prod.yml'):
              path = Path(name)
              path.write_text(path.read_text().replace(
                  'postgres-data:/var/lib/postgresql/data',
                  'postgres-data:/var/lib/postgresql',
              ))

          operations = Path('backend/internal/operations/service.go')
          text = operations.read_text()
          text = text.replace("VALUES($1,$2,$3,$4,'running',now(),$5)", "VALUES($1,$2,$3,$4,'running',now(),$5::jsonb)")
          text = text.replace("VALUES($1,$2,$3,$4,$5,$6,now(),$7,$8)", "VALUES($1,$2,$3,$4,$5::jsonb,$6::jsonb,now(),$7,$8)")
          text = text.replace("response_data=$4, error_message=$5", "response_data=$4::jsonb, error_message=$5")
          text = text.replace("operationType, payload)", "operationType, string(payload))")
          text = text.replace("name, inJSON, outJSON, ms, status)", "name, string(inJSON), string(outJSON), ms, status)")
          text = text.replace("time.Since(t.start).Milliseconds(), payload, errorText)", "time.Since(t.start).Milliseconds(), string(payload), errorText)")
          operations.write_text(text)

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Resolve Go dependencies
        working-directory: backend
        run: |
          go mod tidy
          gofmt -w .

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve frontend dependencies
        working-directory: frontend
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --no-audit --no-fund

      - name: Align reproducible frontend builds
        shell: python
        run: |
          from pathlib import Path
          dockerfile = Path('frontend/Dockerfile')
          text = dockerfile.read_text()
          text = text.replace('COPY package.json ./\nRUN npm install --no-audit --no-fund', 'COPY package.json package-lock.json ./\nRUN npm ci --no-audit --no-fund')
          text = text.replace('COPY package*.json ./\nRUN npm ci', 'COPY package.json package-lock.json ./\nRUN npm ci')
          dockerfile.write_text(text)

      - name: Publish normalized source before validation
        shell: bash
        run: |
          set -euo pipefail
          rm -rf bootstrap frontend/dist backend/coverage.out
          rm -f .github/workflows/bootstrap.yml
          rm -f .github/workflows/issue-bootstrap.yml
          rm -f .github/workflows/repository-bootstrap.yml
          rm -f .github/workflows/postgres18-volume-fix.yml
          rm -f .github/workflows/final-validation.yml
          rm -f .github/workflows/finalize-pgvista.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "fix: finalize PGVista v0.1.0 source"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Validate backend
        working-directory: backend
        run: |
          test -z "$(gofmt -l .)"
          go vet ./...
          go test -race -coverprofile=coverage.out ./...

      - name: Validate frontend
        working-directory: frontend
        run: |
          npm run typecheck
          npm run lint
          npm run build
          npm audit --omit=dev --audit-level=high

      - name: Validate Compose and containers
        run: |
          cp .env.example .env
          docker compose config >/dev/null
          docker compose -f deploy/compose.prod.yml config >/dev/null
          docker build -t pgvista-backend:v0.1.0 ./backend
          docker build -t pgvista-frontend:v0.1.0 ./frontend

      - name: Record successful validation
        shell: bash
        run: |
          cat > docs/validation.md <<EOF
          # PGVista v0.1.0 Validation

          PGVista v0.1.0 passed the final repository validation.

          - Go formatting, vet and race-enabled tests: passed
          - Vue/TypeScript type checking and ESLint: passed
          - Frontend production build and production dependency audit: passed
          - Development and production Compose parsing: passed
          - Backend and frontend container builds: passed
          - PostgreSQL 18 volume layout: validated

          Validated from workflow commit: \`${GITHUB_SHA}\`
          EOF
          rm -rf frontend/dist backend/coverage.out
          git add docs/validation.md
          git commit -m "docs: record PGVista v0.1.0 validation"
          git pull --rebase origin main
          git push origin main

      - name: Close finalization issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "PGVista v0.1.0 was finalized, validated, and cleaned of bootstrap artifacts."
