name: One-time PGVista Bootstrap

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  bootstrap:
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == 'bootstrap-pgvista-source'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          cat bootstrap/part-* > /tmp/PGVista-source.tar.gz.b64
          echo "877ee18ef6157261e8b3becccc0fa5d0321f45b67b0f0fa33a5c01b06f293356  /tmp/PGVista-source.tar.gz.b64" | sha256sum -c -
          base64 --decode /tmp/PGVista-source.tar.gz.b64 > /tmp/PGVista-source.tar.gz
          echo "493c205c5a6917486761f802afda0c378239e623f1361c0d57b96412300087b8  /tmp/PGVista-source.tar.gz" | sha256sum -c -
          tar -xzf /tmp/PGVista-source.tar.gz

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Resolve Go dependencies and verify backend
        working-directory: backend
        run: |
          go mod tidy
          test -z "$(gofmt -l .)"
          go vet ./...
          go test -race ./...

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify frontend
        working-directory: frontend
        run: |
          npm install --no-audit --no-fund
          npm run typecheck
          npm run lint
          npm run build
          npm audit --omit=dev --audit-level=high

      - name: Publish complete source tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf bootstrap .github/workflows/bootstrap.yml .github/workflows/issue-bootstrap.yml frontend/dist
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: publish PGVista full-stack platform"
          git push

      - name: Close bootstrap issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "PGVista source bootstrap completed."
